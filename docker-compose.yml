version: '3.8'

services:
  # MQTT Broker
  mosquitto:
    image: eclipse-mosquitto:latest
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
    environment:
      TZ: UTC
    command: mosquitto -c /mosquitto/config/mosquitto.conf

volumes:
  mosquitto_data:

# Usage:
# 1. Start services: docker-compose up -d
# 2. In another terminal, run: solaredge-modbus mqtt-bridge --mqtt-host localhost
# 3. Monitor messages: docker exec -it solaredge_modbus-mosquitto_1 mosquitto_sub -t 'solaredge/#' -v
# 4. Send commands: docker exec -it solaredge_modbus-mosquitto_1 mosquitto_pub -t 'solaredge/set/register/40245' -m '{"value": 50}'
