[project]
name = "solaredgemodbus2mqtt"
version = "1.1.0"
description = "SolarEdge SunSpec Modbus reader/writer module and CLI"
readme = "README.md"
requires-python = ">=3.12"
authors = [
	{ name = "Skier" },
]
keywords = ["solaredge", "modbus", "sunspec", "pymodbus"]
classifiers = [
	"Programming Language :: Python :: 3",
	"Programming Language :: Python :: 3.12",
	"License :: Other/Proprietary License",
	"Operating System :: OS Independent",
]
dependencies = [
	"pymodbus>=3.13.0",
	"pydantic>=2.11.0",
	"paho-mqtt>=2.0.0",
]

[project.scripts]
solaredge-modbus = "solaredgemodbus2mqtt.solaredge_modbus.cli:main"

[dependency-groups]
dev = [
	"pytest>=8.3.0",
	"python-semantic-release>=9.8.0",
	"build>=1.0.0",
	"black>=26.5.0",
]

[build-system]
requires = ["hatchling>=1.29.0"]
build-backend = "hatchling.build"

[tool.black]
line-length = 127

[tool.uv]
package = true

[tool.hatch.build.targets.wheel]
packages = ["solaredgemodbus2mqtt"]

[tool.semantic_release]
assets = []
build_command_env = []
build_command = "pip install uv && uv build"
commit_message = "{version}\n\nAutomatically generated by python-semantic-release"
commit_parser = "conventional"
logging_use_named_masks = false
major_on_zero = true
allow_zero_version = true
no_git_verify = false
tag_format = "v{version}"
version_toml = [
	"pyproject.toml:project.version",
]

[tool.semantic_release.branches.main]
match = "(main|master)"
prerelease_token = "rc"
prerelease = false

[tool.semantic_release.changelog]
template_dir = "templates"
changelog_file = "CHANGELOG.md"
exclude_commit_patterns = []

[tool.semantic_release.changelog.environment]
block_start_string = "{%"
block_end_string = "%}"
variable_start_string = "{{"
variable_end_string = "}}"
comment_start_string = "{#"
comment_end_string = "#}"
trim_blocks = false
lstrip_blocks = false
newline_sequence = "\n"
keep_trailing_newline = false
extensions = []
autoescape = true

[tool.semantic_release.commit_author]
env = "GIT_COMMIT_AUTHOR"
default = "semantic-release <semantic-release>"

[tool.semantic_release.commit_parser_options]
allowed_tags = ["build", "chore", "ci", "docs", "feat", "fix", "perf", "style", "refactor", "test"]
minor_tags = ["feat"]
patch_tags = ["fix", "perf"]
default_bump_level = 0

[tool.semantic_release.remote]
name = "origin"
type = "github"
ignore_token_for_push = false
insecure = false

[tool.semantic_release.publish]
dist_glob_patterns = ["dist/*"]
upload_to_vcs_release = true