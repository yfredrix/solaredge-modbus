# Mosquitto configuration for development/testing

port 1883

# MQTT over WebSocket
listener 9001
protocol websockets

# Allow anonymous connections for local development only.
# docker-compose.yml binds listeners to localhost to avoid remote access.
allow_anonymous true

# Store messages in database
persistence true
persistence_location /mosquitto/data/

# Max message size (5MB)
max_queued_messages 1000
message_size_limit 5242880

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all
log_timestamp true
